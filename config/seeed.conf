CONFIG_ZMK_BLE=y
CONFIG_ZMK_USB=n
# Windows: default (y) can block HID until battery GATT subscribes; use n per ZMK bluetooth docs.
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n
# Disables 2M PHY; helps pairing/connect on many Windows adapters (Realtek/Intel).
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
# BLE implies battery reporting; disable to drop BAS GATT (fewer Windows GATT quirks).
CONFIG_ZMK_BATTERY_REPORTING=n
# Some Windows stacks are happier with boot-compatible HKRO than NKRO.
CONFIG_ZMK_HID_REPORT_TYPE_HKRO=y
CONFIG_SETTINGS=y
CONFIG_BT_SETTINGS=y
CONFIG_BT_SMP=y
CONFIG_BT_BONDABLE=y
CONFIG_BT_MAX_PAIRED=1
# Stronger link margin if connection flaps after reconnect.
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
# Lower slave latency can reduce flaky reconnect after peripheral restart (tradeoff: slightly higher power).
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
